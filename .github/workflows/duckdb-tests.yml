name: DuckDB Iceberg Feature Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  duckdb-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DuckDB
        run: pip install duckdb==1.5.4

      - name: Start Iceberg REST catalog (Apache iceberg-rest-fixture + MinIO)
        run: |
          set -euo pipefail
          docker network create iceberg-net

          # MinIO S3-compatible object storage for the table data files.
          docker run -d --name minio --network iceberg-net \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=admin -e MINIO_ROOT_PASSWORD=password \
            minio/minio:latest server /data
          sleep 5

          # Create the warehouse bucket.
          docker run --rm --network iceberg-net --entrypoint /bin/sh minio/mc:latest -c \
            "mc alias set m http://minio:9000 admin password && mc mb -p m/warehouse"

          # Apache Iceberg REST catalog backed by the MinIO warehouse.
          docker run -d --name iceberg-rest --network iceberg-net \
            -p 8181:8181 \
            -e CATALOG_WAREHOUSE=s3://warehouse/ \
            -e CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO \
            -e CATALOG_S3_ENDPOINT=http://minio:9000 \
            -e CATALOG_S3_PATH__STYLE__ACCESS=true \
            -e AWS_ACCESS_KEY_ID=admin -e AWS_SECRET_ACCESS_KEY=password -e AWS_REGION=us-east-1 \
            apache/iceberg-rest-fixture:latest

          # Wait for the catalog to answer its config endpoint.
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:8181/v1/config?warehouse=s3://warehouse/" >/dev/null 2>&1; then
              echo "Iceberg REST catalog is ready"; break
            fi
            sleep 2
          done

      - name: Run DuckDB Iceberg feature tests
        env:
          ICEBERG_REST_URI: http://127.0.0.1:8181
          ICEBERG_REST_WAREHOUSE: warehouse
          ICEBERG_S3_ENDPOINT: 127.0.0.1:9000
          ICEBERG_S3_KEY_ID: admin
          ICEBERG_S3_SECRET: password
          ICEBERG_S3_REGION: us-east-1
        run: |
          export REPO_ROOT="${GITHUB_WORKSPACE}"
          export REPORT_DIR="${GITHUB_WORKSPACE}/test-reports"
          export ICEBERG_WAREHOUSE="${RUNNER_TEMP}/duckdb-iceberg-warehouse"
          python tests/duckdb_feature_tests.py
        continue-on-error: true

      - name: Tear down Iceberg REST catalog
        if: always()
        run: docker rm -f iceberg-rest minio 2>/dev/null || true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-iceberg-test-report
          path: test-reports/
          retention-days: 30

      - name: Post PR comment with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'test-reports/duckdb-iceberg-test-report.md';
            if (!fs.existsSync(reportPath)) {
              console.log('No report found, skipping comment');
              return;
            }
            const body = fs.readFileSync(reportPath, 'utf8');
            const truncated = body.length > 60000 ? body.substring(0, 60000) + '\n\n... (truncated)' : body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '<!-- duckdb-iceberg-test-report -->';
            const existing = comments.find(c => c.body.includes(marker));
            const commentBody = `${marker}\n${truncated}`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
            }
