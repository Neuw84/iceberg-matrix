name: Flink Iceberg Feature Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  # Flink 2.3.0 engine. Iceberg has not released a Flink 2.2/2.3 runtime yet, so
  # we use the latest published one (iceberg-flink-runtime-2.1), which is
  # verified to work against the 2.3 engine. FLINK_MAJOR is the runtime's Flink
  # minor, which can differ from the engine version.
  FLINK_VERSION: "2.3.0"
  FLINK_MAJOR: "2.1"
  ICEBERG_VERSION: "1.11.0"
  HADOOP_UBER_VERSION: "2.8.3-10.0"

jobs:
  flink-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start Iceberg REST catalog (Apache iceberg-rest-fixture + MinIO)
        run: |
          set -euo pipefail
          docker network create iceberg-net
          docker run -d --name minio --network iceberg-net -p 9000:9000 \
            -e MINIO_ROOT_USER=admin -e MINIO_ROOT_PASSWORD=password \
            minio/minio:latest server /data
          sleep 5
          docker run --rm --network iceberg-net --entrypoint /bin/sh minio/mc:latest -c \
            "mc alias set m http://minio:9000 admin password && mc mb -p m/warehouse"
          docker run -d --name iceberg-rest --network iceberg-net -p 8181:8181 \
            -e CATALOG_WAREHOUSE=s3://warehouse/ \
            -e CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO \
            -e CATALOG_S3_ENDPOINT=http://minio:9000 \
            -e CATALOG_S3_PATH__STYLE__ACCESS=true \
            -e AWS_ACCESS_KEY_ID=admin -e AWS_SECRET_ACCESS_KEY=password -e AWS_REGION=us-east-1 \
            apache/iceberg-rest-fixture:latest
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:8181/v1/config?warehouse=s3://warehouse/" >/dev/null 2>&1; then
              echo "Iceberg REST catalog is ready"; break
            fi
            sleep 2
          done

      - name: Download and setup Flink
        run: |
          FLINK_DIST="flink-${FLINK_VERSION}-bin-scala_2.12.tgz"
          FLINK_URL="https://archive.apache.org/dist/flink/flink-${FLINK_VERSION}/${FLINK_DIST}"
          echo "Downloading Flink ${FLINK_VERSION}..."
          curl -fsSL "${FLINK_URL}" -o "${RUNNER_TEMP}/${FLINK_DIST}"
          tar -xzf "${RUNNER_TEMP}/${FLINK_DIST}" -C "${RUNNER_TEMP}"
          echo "FLINK_HOME=${RUNNER_TEMP}/flink-${FLINK_VERSION}" >> $GITHUB_ENV

      - name: Add Iceberg + AWS + Hadoop jars to Flink lib
        run: |
          FLINK_HOME="${RUNNER_TEMP}/flink-${FLINK_VERSION}"
          BASE="https://repo1.maven.org/maven2/org/apache"
          # Iceberg Flink runtime (2.1 is the latest published), plus the AWS bundle
          # that provides S3FileIO so Iceberg reads/writes data files on S3 (MinIO).
          curl -fsSL "${BASE}/iceberg/iceberg-flink-runtime-${FLINK_MAJOR}/${ICEBERG_VERSION}/iceberg-flink-runtime-${FLINK_MAJOR}-${ICEBERG_VERSION}.jar" \
            -o "${FLINK_HOME}/lib/iceberg-flink-runtime-${FLINK_MAJOR}-${ICEBERG_VERSION}.jar"
          curl -fsSL "${BASE}/iceberg/iceberg-aws-bundle/${ICEBERG_VERSION}/iceberg-aws-bundle-${ICEBERG_VERSION}.jar" \
            -o "${FLINK_HOME}/lib/iceberg-aws-bundle-${ICEBERG_VERSION}.jar"
          # Iceberg's Flink catalog loader instantiates org.apache.hadoop.conf.Configuration
          # regardless of catalog type, so Hadoop classes are required on the classpath.
          curl -fsSL "${BASE}/flink/flink-shaded-hadoop-2-uber/${HADOOP_UBER_VERSION}/flink-shaded-hadoop-2-uber-${HADOOP_UBER_VERSION}.jar" \
            -o "${FLINK_HOME}/lib/flink-shaded-hadoop-2-uber-${HADOOP_UBER_VERSION}.jar"

      - name: Start Flink cluster
        run: |
          echo "Starting Flink standalone cluster..."
          "${FLINK_HOME}/bin/start-cluster.sh"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8081/overview > /dev/null 2>&1; then
              echo "Flink cluster is ready"
              break
            fi
            echo "Waiting for Flink cluster... ($i/30)"
            sleep 2
          done

      - name: Run Flink Iceberg feature tests
        env:
          ICEBERG_REST_URI: http://127.0.0.1:8181
          ICEBERG_REST_WAREHOUSE: s3://warehouse/
          ICEBERG_S3_ENDPOINT: http://127.0.0.1:9000
          ICEBERG_S3_KEY_ID: admin
          ICEBERG_S3_SECRET: password
        run: |
          export REPO_ROOT="${GITHUB_WORKSPACE}"
          export REPORT_DIR="${GITHUB_WORKSPACE}/test-reports"
          export FLINK_VERSION="${FLINK_VERSION}"
          export FLINK_ICEBERG_VERSION="${ICEBERG_VERSION}"
          python tests/flink_feature_tests.py
        continue-on-error: true

      - name: Stop Flink cluster
        if: always()
        run: |
          "${FLINK_HOME}/bin/stop-cluster.sh" || true

      - name: Tear down Iceberg REST catalog
        if: always()
        run: docker rm -f iceberg-rest minio 2>/dev/null || true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flink-iceberg-test-report
          path: test-reports/
          retention-days: 30

      - name: Post PR comment with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'test-reports/flink-iceberg-test-report.md';
            if (!fs.existsSync(reportPath)) {
              console.log('No report found, skipping comment');
              return;
            }
            const body = fs.readFileSync(reportPath, 'utf8');
            const truncated = body.length > 60000 ? body.substring(0, 60000) + '\n\n... (truncated)' : body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '<!-- flink-iceberg-test-report -->';
            const existing = comments.find(c => c.body.includes(marker));
            const commentBody = `${marker}\n${truncated}`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
            }
